<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Time Sheet – Victor Industries</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 16px; font-size: 14px; color: #111; }
  .form-wrapper { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .form-title { text-align: center; font-size: 17px; font-weight: bold; letter-spacing: 0.04em; padding: 14px 16px 10px; border-bottom: 2px solid #111; }
  .header-row { display: flex; border-bottom: 1px solid #aaa; align-items: center; min-height: 72px; }
  .logo-block { flex: 1; padding: 10px 14px; display: flex; align-items: center; border-right: 1px solid #aaa; }
  .logo-block img { max-height: 56px; object-fit: contain; }
  .back-link { padding: 10px 16px; font-size: 13px; color: #555; text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: #111; }

  .section { border-bottom: 1px solid #eee; padding: 14px 16px; }

  .field-label { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 6px; }
  .field-input { border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 15px; width: 100%; background: #fafafa; padding: 10px 12px; color: #111; }
  .field-input:focus { border-color: #999; background: #fff; }

  /* Clock display */
  .clock-display {
    text-align: center;
    padding: 20px 16px;
    border-bottom: 1px solid #eee;
  }
  .live-time {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 0.04em;
    color: #111;
    font-variant-numeric: tabular-nums;
  }
  .live-date {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* Punch buttons */
  .punch-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
  }
  .punch-btn {
    padding: 16px 10px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fafafa;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    color: #555;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .punch-btn:hover { border-color: #999; background: #f0f0f0; color: #111; }
  .punch-btn:active { transform: scale(0.97); }
  .punch-btn .btn-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .punch-btn .btn-time { font-size: 11px; color: #aaa; font-weight: normal; margin-top: 3px; display: block; }

  .punch-btn.punched-in { border-color: #4caf50; background: #f5fff5; color: #2e7d32; }
  .punch-btn.punched-out { border-color: #e53935; background: #fff5f5; color: #c62828; }
  .punch-btn.on-break { border-color: #ff9800; background: #fff8f0; color: #e65100; }
  .punch-btn.break-done { border-color: #2196f3; background: #f0f8ff; color: #1565c0; }
  .punch-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  /* Today's log */
  .log-section { border-bottom: 1px solid #eee; padding: 14px 16px; }
  .log-empty { font-size: 13px; color: #ccc; text-align: center; padding: 10px 0; }
  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-type { font-weight: bold; color: #555; }
  .log-time { color: #999; font-size: 12px; }
  .log-duration { font-size: 12px; color: #111; font-weight: bold; }

  /* Totals */
  .totals-section { padding: 14px 16px; border-bottom: 1px solid #eee; }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid #f5f5f5;
  }
  .total-row:last-child { border-bottom: none; }
  .total-label { color: #888; }
  .total-value { font-weight: bold; color: #111; }
  .total-value.overtime { color: #e53935; }
  .total-row.grand { border-top: 1px solid #ddd; margin-top: 4px; padding-top: 10px; }
  .total-row.grand .total-label { font-weight: bold; color: #111; font-size: 15px; }
  .total-row.grand .total-value { font-size: 15px; }

  /* Weekly summary */
  .week-section { padding: 14px 16px; border-bottom: 1px solid #eee; }
  .week-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid #f5f5f5;
    color: #555;
  }
  .week-row:last-child { border-bottom: none; }
  .week-row.today { color: #111; font-weight: bold; }
  .week-row .day-label { flex: 1; }
  .week-row .day-hours { color: #111; font-weight: bold; min-width: 60px; text-align: right; }
  .week-row .day-hours.ot { color: #e53935; }

  /* Action bar */
  .action-bar { display: flex; gap: 10px; padding: 14px 16px; background: #fafafa; border-top: 1px solid #eee; }
  .btn-secondary { flex: 1; padding: 10px; background: #fff; color: #111; border: 2px solid #111; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .btn-secondary:hover { background: #f0f0f0; }

  @media print {
    .punch-grid, .action-bar, .clock-display { display: none; }
    body { background: #fff; padding: 0; }
    .form-wrapper { box-shadow: none; }
  }
</style>
</head>

  <!-- Employee selector -->
  <div class="section">
    <div class="field-label">Employee</div>
    <select class="field-input" id="f-employee" onchange="onEmployeeChange()">
      <option value="">Select employee...</option>
      <option>— Add employees here —</option>
    </select>
  </div>

  <!-- Live clock -->
  <div class="clock-display">
    <div class="live-time" id="liveClock">--:--:--</div>
    <div class="live-date" id="liveDate">--</div>
  </div>

  <!-- Punch buttons -->
  <div class="punch-grid">
    <button class="punch-btn disabled" id="btn-in" onclick="punch('in')">
      <span class="btn-icon">&#9654;</span>
      Clock In
      <span class="btn-time" id="time-in">--</span>
    </button>
    <button class="punch-btn disabled" id="btn-out" onclick="punch('out')">
      <span class="btn-icon">&#9646;</span>
      Clock Out
      <span class="btn-time" id="time-out">--</span>
    </button>
    <button class="punch-btn disabled" id="btn-break-start" onclick="punch('break-start')">
      <span class="btn-icon">&#9749;</span>
      Start Break
      <span class="btn-time" id="time-break-start">--</span>
    </button>
    <button class="punch-btn disabled" id="btn-break-end" onclick="punch('break-end')">
      <span class="btn-icon">&#9654;&#9654;</span>
      End Break
      <span class="btn-time" id="time-break-end">--</span>
    </button>
  </div>

  <!-- Today's log -->
  <div class="log-section">
    <div class="field-label" style="margin-bottom:8px;">Today's Log</div>
    <div id="logContainer"><div class="log-empty">No punches yet today.</div></div>
  </div>

  <!-- Totals -->
  <div class="totals-section">
    <div class="field-label" style="margin-bottom:8px;">Today's Hours</div>
    <div class="total-row">
      <span class="total-label">Regular hours</span>
      <span class="total-value" id="tot-regular">0h 00m</span>
    </div>
    <div class="total-row">
      <span class="total-label">Break time</span>
      <span class="total-value" id="tot-break">0h 00m</span>
    </div>
    <div class="total-row">
      <span class="total-label">Overtime (over 8h)</span>
      <span class="total-value overtime" id="tot-ot">0h 00m</span>
    </div>
    <div class="total-row grand">
      <span class="total-label">Total worked</span>
      <span class="total-value" id="tot-total">0h 00m</span>
    </div>
  </div>

  <!-- Weekly summary -->
  <div class="week-section">
    <div class="field-label" style="margin-bottom:8px;">This Week</div>
    <div id="weekContainer"></div>
    <div class="total-row grand" style="margin-top:8px;">
      <span class="total-label">Week Total</span>
      <span class="total-value" id="week-total">0h 00m</span>

  </div>

</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const REGULAR_HOURS = 8;

function getStorageKey(employee, date) {
  return 'vi_ts_' + employee.replace(/\s+/g,'_') + '_' + date;
}

function getWeekKey(employee) {
  return 'vi_ts_week_' + employee.replace(/\s+/g,'_') + '_' + getWeekStart();
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day;
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function fmtDuration(ms) {
  if (ms <= 0) return '0h 00m';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + 'h ' + String(m).padStart(2,'0') + 'm';
}

// State
let employee = '';
let punches = []; // [{type, ts}]

function loadData() {
  if (!employee) return;
  const raw = localStorage.getItem(getStorageKey(employee, todayStr()));
  punches = raw ? JSON.parse(raw) : [];
  renderAll();
}

function saveData() {
  if (!employee) return;
  localStorage.setItem(getStorageKey(employee, todayStr()), JSON.stringify(punches));
  updateWeekTotal();
}

function onEmployeeChange() {
  employee = document.getElementById('f-employee').value;
  if (!employee || employee.startsWith('—')) {
    employee = '';
    setButtonsDisabled(true);
    return;
  }
  setButtonsDisabled(false);
  loadData();
  renderWeek();
}

function setButtonsDisabled(disabled) {
  ['btn-in','btn-out','btn-break-start','btn-break-end'].forEach(id => {
    const btn = document.getElementById(id);
    if (disabled) { btn.classList.add('disabled'); }
    else { btn.classList.remove('disabled'); }
  });
}

function punch(type) {
  if (!employee) return;
  const ts = Date.now();
  punches.push({ type, ts });
  saveData();
  renderAll();
}

function getStatus() {
  // Returns: 'out' | 'in' | 'on-break'
  if (!punches.length) return 'out';
  const last = punches[punches.length - 1];
  if (last.type === 'in' || last.type === 'break-end') return 'in';
  if (last.type === 'break-start') return 'on-break';
  return 'out';
}

function calcTotals() {
  let workedMs = 0;
  let breakMs = 0;
  let inTs = null;
  let breakStartTs = null;

  punches.forEach(p => {
    if (p.type === 'in') { inTs = p.ts; }
    else if (p.type === 'out' && inTs) { workedMs += p.ts - inTs; inTs = null; }
    else if (p.type === 'break-start' && inTs) {
      workedMs += p.ts - inTs; inTs = null; breakStartTs = p.ts;
    }
    else if (p.type === 'break-end') {
      if (breakStartTs) { breakMs += p.ts - breakStartTs; breakStartTs = null; }
      inTs = p.ts;
    }
  });

  // If still clocked in
  if (inTs) workedMs += Date.now() - inTs;
  if (breakStartTs) breakMs += Date.now() - breakStartTs;

  const regularMs = Math.min(workedMs, REGULAR_HOURS * 3600000);
  const otMs = Math.max(0, workedMs - REGULAR_HOURS * 3600000);
  return { workedMs, breakMs, regularMs, otMs };
}

function renderAll() {
  renderButtons();
  renderLog();
  renderTotals();
}

function renderButtons() {
  const status = getStatus();
  const btnIn = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  const btnBs = document.getElementById('btn-break-start');
  const btnBe = document.getElementById('btn-break-end');

  // Reset classes
  [btnIn, btnOut, btnBs, btnBe].forEach(b => {
    b.classList.remove('punched-in','punched-out','on-break','break-done','disabled');
  });

  if (status === 'out') {
    // Can only clock in
    btnOut.classList.add('disabled');
    btnBs.classList.add('disabled');
    btnBe.classList.add('disabled');
  } else if (status === 'in') {
    btnIn.classList.add('punched-in');
    btnBe.classList.add('disabled');
  } else if (status === 'on-break') {
    btnIn.classList.add('disabled');
    btnOut.classList.add('disabled');
    btnBs.classList.add('on-break','disabled');
    btnBe.classList.remove('disabled');
  }

  // Show last punch times
  const typeToBtn = { 'in': 'time-in', 'out': 'time-out', 'break-start': 'time-break-start', 'break-end': 'time-break-end' };
  Object.keys(typeToBtn).forEach(type => {
    const last = [...punches].reverse().find(p => p.type === type);
    document.getElementById(typeToBtn[type]).textContent = last ? fmtTime(last.ts) : '--';
  });
}

function renderLog() {
  const container = document.getElementById('logContainer');
  if (!punches.length) {
    container.innerHTML = '<div class="log-empty">No punches yet today.</div>';
    return;
  }

  const labels = { 'in': 'Clocked In', 'out': 'Clocked Out', 'break-start': 'Break Started', 'break-end': 'Break Ended' };
  container.innerHTML = punches.map(p =>
    '<div class="log-entry">' +
    '<span class="log-type">' + (labels[p.type]||p.type) + '</span>' +
    '<span class="log-time">' + fmtTime(p.ts) + '</span>' +
    '</div>'
  ).join('');
}

function renderTotals() {
  const { workedMs, breakMs, regularMs, otMs } = calcTotals();
  document.getElementById('tot-regular').textContent = fmtDuration(regularMs);
  document.getElementById('tot-break').textContent = fmtDuration(breakMs);
  document.getElementById('tot-ot').textContent = fmtDuration(otMs);
  document.getElementById('tot-total').textContent = fmtDuration(workedMs);
}

function updateWeekTotal() {
  if (!employee) return;
  const weekData = getWeekData();
  weekData[todayStr()] = calcTotals().workedMs;
  localStorage.setItem(getWeekKey(employee), JSON.stringify(weekData));
}

function getWeekData() {
  const raw = localStorage.getItem(getWeekKey(employee));
  return raw ? JSON.parse(raw) : {};
}

function renderWeek() {
  if (!employee) return;
  const weekData = getWeekData();
  const today = todayStr();
  const startDate = new Date(getWeekStart() + 'T12:00:00');
  let weekTotalMs = 0;
  let html = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = d.toISOString().slice(0,10);
    const ms = weekData[dateStr] || (dateStr === today ? calcTotals().workedMs : 0);
    weekTotalMs += ms;
    const isToday = dateStr === today;
    const isOt = ms > REGULAR_HOURS * 3600000;
    html += '<div class="week-row' + (isToday ? ' today' : '') + '">' +
      '<span class="day-label">' + DAYS[d.getDay()] + (isToday ? ' (today)' : '') + '</span>' +
      '<span class="day-hours' + (isOt ? ' ot' : '') + '">' + (ms > 0 ? fmtDuration(ms) : '—') + '</span>' +
      '</div>';
  }

  document.getElementById('weekContainer').innerHTML = html;
  document.getElementById('week-total').textContent = fmtDuration(weekTotalMs);
}

function exportReport() {
  if (!employee) { alert('Please select an employee first.'); return; }
  const { workedMs, breakMs, regularMs, otMs } = calcTotals();
  const weekData = getWeekData();
  const startDate = new Date(getWeekStart() + 'T12:00:00');
  let weekTotal = 0;
  let weekLines = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = d.toISOString().slice(0,10);
    const ms = weekData[dateStr] || 0;
    weekTotal += ms;
    if (ms > 0) weekLines += DAYS[d.getDay()] + ' (' + dateStr + '): ' + fmtDuration(ms) + '\n';
  }

  const punchLines = punches.map(p => {
    const labels = { 'in': 'Clock In', 'out': 'Clock Out', 'break-start': 'Break Start', 'break-end': 'Break End' };
    return (labels[p.type]||p.type) + ': ' + fmtTime(p.ts);
  }).join('\n');

  const subject = encodeURIComponent('Timesheet – ' + employee + ' – ' + todayStr());
  const body = encodeURIComponent(
    'TIMESHEET\nVictor Industries USA, Inc.\n' +
    '=====================================\n\n' +
    'EMPLOYEE: ' + employee + '\n' +
    'DATE: ' + todayStr() + '\n\n' +
    "TODAY'S PUNCHES:\n" + punchLines + '\n\n' +
    "TODAY'S HOURS:\n" +
    'Regular:  ' + fmtDuration(regularMs) + '\n' +
    'Break:    ' + fmtDuration(breakMs) + '\n' +
    'Overtime: ' + fmtDuration(otMs) + '\n' +
    'Total:    ' + fmtDuration(workedMs) + '\n\n' +
    'WEEK SUMMARY:\n' + weekLines +
    'Week Total: ' + fmtDuration(weekTotal)
  );
  window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
}

// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('liveDate').textContent = DAYS[now.getDay()] + ', ' + now.toLocaleDateString([], {month:'long', day:'numeric', year:'numeric'});
  // Update running totals every second if clocked in
  if (employee && (getStatus() === 'in' || getStatus() === 'on-break')) {
    renderTotals();
    renderWeek();
  }
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
